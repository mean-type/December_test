    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'December25910', '맑은 고딕', 'Malgun Gothic', sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      overflow: hidden;
      position: relative;
      touch-action: none;
    }

    .container {
      height: 100vh;
      width: 100vw;
      position: relative;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 24px;
      line-height: 24px;
      color: #333;
      outline: none;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      font-feature-settings: "vert" 1;

      height: calc(100vh - 80px);
      width: calc(100vw - 80px);
      max-height: calc(100vh - 80px);
      max-width: calc(100vw - 80px);

      padding: 20px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);

      overflow: visible;
      transition: none !important;
      animation: none !important;
    }

    .vertical-text:focus {
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      border-color: rgba(52, 152, 219, 0.3);
    }

    .vertical-text * {
      font-family: 'December25910', '맑은 고딕', 'Malgun Gothic', sans-serif !important;
      font-size: inherit !important;
      line-height: inherit !important;
      color: inherit !important;
      background: transparent !important;
      text-decoration: none !important;
      font-weight: normal !important;
      font-style: normal !important;
      transition: none !important;
      animation: none !important;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      .vertical-text {
        height: calc(100vh - 40px);
        width: calc(100vw - 40px);
        max-height: calc(100vh - 40px);
        max-width: calc(100vw - 40px);
        font-size: 18px;
        line-height: 18px;
        padding: 15px;
      }
    }

    .vertical-text::selection {
      background: rgba(52, 152, 219, 0.3);
    }

    .vertical-text::-moz-selection {
      background: rgba(52, 152, 219, 0.3);
    }

    .size-indicator {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(52, 152, 219, 0.8);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    .size-indicator.show {
      opacity: 1;
    }
  
    .feature-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      padding: 8px 10px;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "맑은 고딕", sans-serif;
      font-size: 11px;
      line-height: 1.4;
      z-index: 1100;
    }

    .feature-panel-title {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .feature-panel label {
      display: block;
      cursor: pointer;
      white-space: nowrap;
    }

    .feature-panel input[type="checkbox"] {
      margin-right: 4px;
      vertical-align: middle;
    }
</style>
</head>
<body>
  <div class="feature-panel">
    <div class="feature-panel-title">OpenType 기능</div>
    <label style="opacity: 0.6;">
      <input type="checkbox" class="ot-feature-checkbox" data-feature="vert" checked disabled>
      vert (세로쓰기 · 항상 적용)
    </label>
    <label>
      <input type="checkbox" class="ot-feature-checkbox" data-feature="fwid">
      한자릿수 숫자 방향전환
    </label>
    <label>
      <input type="checkbox" class="ot-feature-checkbox" data-feature="clig">
      두자릿수 숫자 방향전환
    </label>
    <label>
      <input type="checkbox" class="ot-feature-checkbox" data-feature="dlig">
      연자표현, 특수문자 합자
    </label>
    <label>
      <input type="checkbox" class="ot-feature-checkbox" data-feature="ss01">
      흰원문자
    </label>
    <label>
      <input type="checkbox" class="ot-feature-checkbox" data-feature="ss02">
      검은원문자
    </label>
        <label>
      <input type="checkbox" class="ot-feature-checkbox" data-feature="ss03">
      괄호문자
    </label>
  </div>

  <div class="container">
    <div class="size-indicator" id="sizeIndicator">24px</div>
    <div id="textDisplay" class="vertical-text" contenteditable="true" spellcheck="false">
섯달 테스트 페이지입니다.
섯달은 12월 1일 텀블벅 공개예정입니다. 
왼쪽 아래 버튼으로 자세한 이야기를 확인하세요!

여기에 자유롭게 텍스트를 입력하고 편집할 수 있습니다.
마우스 휠 또는 핀치 제스처로 글자 크기를 조절하세요.
    </div>
  </div>

  <script>
    const textDisplay = document.getElementById('textDisplay');
    const sizeIndicator = document.getElementById('sizeIndicator');
    const gestureIndicator = document.getElementById('gestureIndicator');
    const featureCheckboxes = document.querySelectorAll('.ot-feature-checkbox');

    let fontSize = 24;
    const minSize = 12;
    const maxSize = 60;
    let sizeIndicatorTimeout;
    let gestureIndicatorTimeout;
    let isPlaceholderActive = true;


    // 터치 관련 변수들
    let initialDistance = 0;
    let initialFontSize = fontSize;
    let isGesturing = false;

    function updateSizeIndicator() {
      sizeIndicator.textContent = fontSize + 'px';
      sizeIndicator.classList.add('show');

      clearTimeout(sizeIndicatorTimeout);
      sizeIndicatorTimeout = setTimeout(() => {
        sizeIndicator.classList.remove('show');
      }, 1500);
    }

    function showGestureIndicator() {
      gestureIndicator.classList.add('show');
      clearTimeout(gestureIndicatorTimeout);
      gestureIndicatorTimeout = setTimeout(() => {
        gestureIndicator.classList.remove('show');
      }, 3000);
    }

    function applyUniformStyling() {
      const allElements = textDisplay.querySelectorAll('*');
      allElements.forEach(element => {
        element.style.fontFamily = 'December25910, "맑은 고딕", "Malgun Gothic", sans-serif';
        element.style.fontSize = fontSize + 'px';
        element.style.lineHeight = fontSize + 'px';
        element.style.color = '#333';
        element.style.backgroundColor = '';
        element.style.textDecoration = '';
        element.style.fontWeight = '';
        element.style.fontStyle = '';
      });

      // 스타일 재적용 후 OpenType 기능도 다시 적용
      updateOpenTypeFeatures();
    }

// ★ 필요할 때 한 번만 초기 문구를 지우는 함수
function clearPlaceholderIfNeeded() {
  if (!isPlaceholderActive) return;
  isPlaceholderActive = false;
  textDisplay.textContent = '';   // 기존 안내 문구 싹 지우기
}

// 사용자가 타이핑을 시작하려고 할 때
textDisplay.addEventListener('focus', clearPlaceholderIfNeeded);
textDisplay.addEventListener('keydown', (e) => {
  // 단순 방향키/ctrl 같은 건 무시하고 싶으면 조건 더 넣어도 됨
  clearPlaceholderIfNeeded();
});

    // OpenType 기능 토글 상태를 읽어와서 적용하는 함수
function updateOpenTypeFeatures() {
  textDisplay.style.fontFeatureSettings = '"vert" 1';

  // 기존에 span에 저장해 둔 data-ot를 기반으로 다시 스타일 재계산(리사이즈/정리용)
  const spans = textDisplay.querySelectorAll('span[data-ot]');
  spans.forEach(applySpanFeatureStyle);
}

function getSelectionRangeInsideTextDisplay() {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return null;

  const range = sel.getRangeAt(0);
  if (range.collapsed) return null;

  // 선택이 textDisplay 내부인지 확인
  const common = range.commonAncestorContainer;
  const commonEl = common.nodeType === 1 ? common : common.parentElement;
  if (!commonEl || !textDisplay.contains(commonEl)) return null;

  return range;
}

function buildFeatureString(extraTags) {
  // vert는 항상 포함
  const features = ['"vert" 1'];
  extraTags.forEach(tag => features.push(`"${tag}" 1`));
  return features.join(', ');
}

function applySpanFeatureStyle(span) {
  const raw = (span.dataset.ot || '').trim();
  const tags = raw ? raw.split(',').map(s => s.trim()).filter(Boolean) : [];
  span.style.fontFeatureSettings = buildFeatureString(tags);
}

// range를 span으로 감싸기 (부분 노드에도 안전하게)
function wrapRangeWithSpan(range) {
  const span = document.createElement('span');
  span.setAttribute('data-ot', '');
  span.appendChild(range.extractContents());
  range.insertNode(span);
  return span;
}

function addFeatureToSelection(tag) {
  const range = getSelectionRangeInsideTextDisplay();
  if (!range) return;

  const span = wrapRangeWithSpan(range);

  // 기존 data-ot 병합
  const current = (span.dataset.ot || '').split(',').map(s => s.trim()).filter(Boolean);
  if (!current.includes(tag)) current.push(tag);
  span.dataset.ot = current.join(',');

  applySpanFeatureStyle(span);
  normalizeOtSpans();
}

function removeFeatureFromSelection(tag) {
  const range = getSelectionRangeInsideTextDisplay();
  if (!range) return;

  // 선택 범위 안의 data-ot span을 찾아 tag 제거
  const spans = Array.from(textDisplay.querySelectorAll('span[data-ot]')).filter(sp => {
    const r = document.createRange();
    r.selectNodeContents(sp);
    // span과 selection range가 교차하면 처리
    return range.compareBoundaryPoints(Range.END_TO_START, r) < 0 &&
           range.compareBoundaryPoints(Range.START_TO_END, r) > 0;
  });

  spans.forEach(span => {
    const tags = (span.dataset.ot || '').split(',').map(s => s.trim()).filter(Boolean);
    const next = tags.filter(t => t !== tag);

    if (next.length === 0) {
      // span 제거(unwrap)
      const parent = span.parentNode;
      while (span.firstChild) parent.insertBefore(span.firstChild, span);
      parent.removeChild(span);
    } else {
      span.dataset.ot = next.join(',');
      applySpanFeatureStyle(span);
    }
  });

  normalizeOtSpans();
}

function normalizeOtSpans() {
  // 인접한 span[data-ot]가 같은 설정이면 합치기
  const walker = document.createTreeWalker(textDisplay, NodeFilter.SHOW_ELEMENT, null);
  const spans = [];
  while (walker.nextNode()) {
    const el = walker.currentNode;
    if (el.tagName === 'SPAN' && el.hasAttribute('data-ot')) spans.push(el);
  }

  spans.forEach(span => {
    // 빈 span 제거
    if (!span.textContent) {
      span.remove();
      return;
    }

    const next = span.nextSibling;
    if (next && next.nodeType === 1 && next.tagName === 'SPAN' && next.hasAttribute('data-ot')) {
      if ((next.dataset.ot || '') === (span.dataset.ot || '')) {
        // merge
        while (next.firstChild) span.appendChild(next.firstChild);
        next.remove();
      }
    }
  });
}


    function updateFontSize(newSize) {
      fontSize = Math.min(Math.max(newSize, minSize), maxSize);
      textDisplay.style.fontSize = fontSize + 'px';
      textDisplay.style.lineHeight = fontSize + 'px';
      applyUniformStyling();
      updateSizeIndicator();
    }

    // 두 터치 포인트 간의 거리 계산
    function getDistance(touches) {
      if (touches.length < 2) return 0;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    // 터치 시작 이벤트
    textDisplay.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        isGesturing = true;
        initialDistance = getDistance(e.touches);
        initialFontSize = fontSize;
        showGestureIndicator();
      }
    }, { passive: false });

    // 터치 이동 이벤트 (핀치 줌)
    textDisplay.addEventListener('touchmove', function(e) {
      if (e.touches.length === 2 && isGesturing) {
        e.preventDefault();
        const currentDistance = getDistance(e.touches);
        
        if (initialDistance > 0) {
          const scale = currentDistance / initialDistance;
          const newFontSize = initialFontSize * scale;
          updateFontSize(newFontSize);
        }
      }
    }, { passive: false });

    // 터치 종료 이벤트
    textDisplay.addEventListener('touchend', function(e) {
      if (e.touches.length < 2) {
        isGesturing = false;
        initialDistance = 0;
      }
    });

    // 데스크탑 마우스 휠 지원 (기존 기능 유지)
    window.addEventListener('wheel', function(e) {
      if (!e.ctrlKey && !e.shiftKey && !e.altKey) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -2 : 2;
        updateFontSize(fontSize + delta);
      }
    }, { passive: false });

    // 키보드 단축키 지원 (기존 기능 유지)
    window.addEventListener('keydown', function(e) {
      if (e.ctrlKey) {
        if (e.key === '=' || e.key === '+') {
          e.preventDefault();
          updateFontSize(fontSize + 2);
        } else if (e.key === '-') {
          e.preventDefault();
          updateFontSize(fontSize - 2);
        } else if (e.key === '0') {
          e.preventDefault();
          updateFontSize(24);
        }
      }
    });

    // 붙여넣기 이벤트 처리
    textDisplay.addEventListener('paste', function(e) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      const selection = window.getSelection();
      if (selection.rangeCount > 0) {
        const range = selection.getRangeAt(0);
        range.deleteContents();
        const textNode = document.createTextNode(text);
        range.insertNode(textNode);
        range.setStartAfter(textNode);
        range.collapse(true);
        selection.removeAllRanges();
        selection.addRange(range);
      } else {
        textDisplay.textContent += text;
      }
      applyUniformStyling();
    });

    // 텍스트 입력 이벤트 처리
    textDisplay.addEventListener('input', function() {
      setTimeout(() => {
        applyUniformStyling();
      }, 10);
    });



    // 초기 글자 크기 적용
    updateFontSize(window.innerWidth <= 768 ? 18 : 24);


    // OpenType 기능 체크박스가 있을 경우 이벤트 등록
if (featureCheckboxes && featureCheckboxes.length > 0) {
  featureCheckboxes.forEach(cb => {
    cb.addEventListener('change', (e) => {
      const tag = cb.dataset.feature;
      if (!tag || tag === 'vert') return;

      if (cb.checked) addFeatureToSelection(tag);
      else removeFeatureFromSelection(tag);

      // 체크박스를 "상태 유지"로 쓰지 않도록: 동작 후 해제
      cb.checked = false;
    });
  });
}

// 초기에는 vert만 적용 + 기존 span 있으면 재계산
updateOpenTypeFeatures();


    // 초기 OpenType 기능 적용
    updateOpenTypeFeatures();

    console.log('세로쓰기 테스트 페이지가 로드되었습니다.');
    console.log('데스크탑: 마우스 휠로 글자 크기를 조절할 수 있습니다.');
    console.log('모바일: 핀치 제스처로 글자 크기를 조절할 수 있습니다.');
  </script>

  <div style="position: fixed; bottom: 20px; left: 20px;">
    <button onclick="window.location.href='glyphs.html'"
            style="padding: 10px 20px; font-size: 14px; border: none; background: #333; color: #fff; border-radius: 6px; cursor: pointer;">
      글리프 보기
    </button>
  </div>

  <!-- 텀블벅 링크 버튼: 글리프 보기 버튼 위 -->
  <div style="position: fixed; bottom: 60px; left: 20px;">
    <button
      onclick="window.open('https://tumblbug.com/font_december', '_blank')"
      style="padding: 10px 20px; font-size: 14px; border: none; background: rgba(52, 152, 219, 0.9); color: #fff; border-radius: 6px; cursor: pointer;">
      텀블벅에서 보기
    </button>
  </div>

</body>

</html>
